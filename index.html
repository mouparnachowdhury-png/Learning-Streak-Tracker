<!DOCTYPE html>
<!--
  Learning Streak Tracker
  A small web app I built while learning to code.

  The idea: every day I'm learning something new (Python, Flutter, web dev...),
  and it's easy to lose track or skip days. So this is a simple checklist where
  I write down what I want to learn today, tick things off, and it keeps a
  "streak" of how many days in a row I showed up.

  Built with plain HTML, CSS and JavaScript. No frameworks yet, on purpose,
  so I could understand every line myself.
-->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Learning Streak Tracker</title>

  <style>
    /* ---------- Colors and basic look ---------- */
    /* I kept the colors in one place so they're easy to change later. */
    :root {
      --bg: #11151f;          /* dark background, easy on the eyes for night study */
      --card: #1a2030;        /* the panel the content sits on */
      --text: #e7ecf3;        /* main text color */
      --muted: #8a93a6;       /* softer text for hints */
      --accent: #5ad6c0;      /* the teal highlight color */
      --done: #4ade80;        /* green for finished tasks */
      --line: #2a3245;        /* subtle divider lines */
    }

    * {
      box-sizing: border-box;   /* makes width/padding behave predictably */
      margin: 0;
      padding: 0;
    }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 24px 16px;
    }

    /* The whole app lives inside this centered card */
    .app {
      width: 100%;
      max-width: 460px;
    }

    header {
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.95rem;
    }

    /* ---------- Streak counter box ---------- */
    .streak {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 18px;
      text-align: center;
      margin-bottom: 18px;
    }

    .streak .number {
      font-size: 2.6rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
    }

    .streak .label {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 4px;
    }

    /* ---------- The input row to add a task ---------- */
    .add-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    #taskInput {
      flex: 1;                 /* take up all the leftover space */
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--line);
      background: var(--card);
      color: var(--text);
      font-size: 1rem;
    }

    #taskInput:focus {
      outline: 2px solid var(--accent);  /* clear focus ring for keyboard users */
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
    }

    .add-btn {
      padding: 12px 18px;
      background: var(--accent);
      color: #06231d;
      font-weight: 600;
    }

    /* ---------- The list of tasks ---------- */
    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
    }

    /* When a task is done, fade it and cross it out */
    li.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    .check {
      width: 22px;
      height: 22px;
      border-radius: 6px;
      border: 2px solid var(--line);
      background: transparent;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #06231d;
      font-size: 14px;
    }

    li.done .check {
      background: var(--done);
      border-color: var(--done);
    }

    .task-text {
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
    }

    .delete {
      background: transparent;
      color: var(--muted);
      font-size: 1.2rem;
      padding: 2px 6px;
    }

    .delete:hover {
      color: #ff6b6b;
    }

    /* Message shown when there are no tasks yet */
    .empty {
      color: var(--muted);
      text-align: center;
      padding: 20px;
      font-size: 0.95rem;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>

<body>
  <div class="app">
    <header>
      <h1>Learning Streak Tracker</h1>
      <p class="subtitle">Show up a little every day. Tick off what you learned.</p>
    </header>

    <!-- The streak box. The number gets filled in by JavaScript. -->
    <div class="streak">
      <div class="number" id="streakNumber">0</div>
      <div class="label" id="streakLabel">day streak</div>
    </div>

    <!-- Type a task here and press Add (or Enter) -->
    <div class="add-row">
      <input
        type="text"
        id="taskInput"
        placeholder="e.g. Watch 1 Python video"
        aria-label="Add a learning task"
      />
      <button class="add-btn" id="addBtn">Add</button>
    </div>

    <!-- All tasks appear inside this list -->
    <ul id="taskList"></ul>

    <footer>Built by Mouparna while learning to code 🌱</footer>
  </div>

  <script>
    /* ============================================================
       JAVASCRIPT
       I added comments above each part so I can explain how it works.
       ============================================================ */

    // 1. Grab the parts of the page I need to work with.
    const taskInput = document.getElementById("taskInput");
    const addBtn = document.getElementById("addBtn");
    const taskList = document.getElementById("taskList");
    const streakNumber = document.getElementById("streakNumber");
    const streakLabel = document.getElementById("streakLabel");

    // 2. This array holds all the tasks.
    //    Each task looks like: { text: "Learn loops", done: false }
    let tasks = [];

    // 3. Save and load.
    //    localStorage lets the browser remember things even after you
    //    close the tab. I store the tasks as text and read them back.
    function saveTasks() {
      localStorage.setItem("myTasks", JSON.stringify(tasks));
    }

    function loadTasks() {
      const saved = localStorage.getItem("myTasks");
      if (saved) {
        tasks = JSON.parse(saved); // turn the saved text back into an array
      }
    }

    // 4. Draw the tasks on the screen.
    //    Every time something changes, I clear the list and rebuild it
    //    from the tasks array. Simple to understand, even if not the
    //    fanciest way to do it.
    function showTasks() {
      taskList.innerHTML = "";

      if (tasks.length === 0) {
        taskList.innerHTML =
          '<p class="empty">Nothing here yet. Add your first thing to learn today.</p>';
        return;
      }

      tasks.forEach(function (task, index) {
        const li = document.createElement("li");
        if (task.done) {
          li.classList.add("done");
        }

        // the little checkbox button
        const checkBtn = document.createElement("button");
        checkBtn.className = "check";
        checkBtn.textContent = task.done ? "✓" : "";
        checkBtn.onclick = function () {
          toggleTask(index);
        };

        // the task text
        const span = document.createElement("span");
        span.className = "task-text";
        span.textContent = task.text;

        // the delete (x) button
        const delBtn = document.createElement("button");
        delBtn.className = "delete";
        delBtn.textContent = "×";
        delBtn.onclick = function () {
          deleteTask(index);
        };

        li.appendChild(checkBtn);
        li.appendChild(span);
        li.appendChild(delBtn);
        taskList.appendChild(li);
      });
    }

    // 5. Add a new task from the input box.
    function addTask() {
      const text = taskInput.value.trim(); // trim removes extra spaces
      if (text === "") return;             // ignore empty input

      tasks.push({ text: text, done: false });
      taskInput.value = ""; // clear the box
      saveTasks();
      showTasks();
    }

    // 6. Mark a task done / not done.
    function toggleTask(index) {
      tasks[index].done = !tasks[index].done; // flip true/false
      saveTasks();
      showTasks();
      updateStreak();
    }

    // 7. Remove a task.
    function deleteTask(index) {
      tasks.splice(index, 1); // remove 1 item at this position
      saveTasks();
      showTasks();
    }

    // 8. The streak.
    //    If you finish at least one task today, today counts.
    //    If your last visit was yesterday, the streak grows.
    //    If you skipped a day, it resets to 1.
    function updateStreak() {
      const anyDone = tasks.some(function (t) {
        return t.done;
      });
      if (!anyDone) return; // nothing finished, nothing to update

      const today = new Date().toDateString(); // e.g. "Wed Jul 01 2026"
      const lastDay = localStorage.getItem("lastDay");
      let streak = Number(localStorage.getItem("streak")) || 0;

      if (lastDay === today) {
        // already counted today, do nothing
      } else {
        const yesterday = new Date();
        yesterday.setDate(yesterday.getDate() - 1);

        if (lastDay === yesterday.toDateString()) {
          streak = streak + 1; // came back the next day
        } else {
          streak = 1; // first day, or a gap, so start fresh
        }

        localStorage.setItem("lastDay", today);
        localStorage.setItem("streak", streak);
      }

      showStreak(streak);
    }

    // 9. Put the streak number on the screen.
    function showStreak(streak) {
      streakNumber.textContent = streak;
      streakLabel.textContent = streak === 1 ? "day streak" : "days streak";
    }

    // 10. Connect the buttons and keyboard.
    addBtn.onclick = addTask;
    taskInput.addEventListener("keydown", function (e) {
      if (e.key === "Enter") {
        addTask();
      }
    });

    // 11. When the page first opens, load saved data and show everything.
    loadTasks();
    showTasks();
    showStreak(Number(localStorage.getItem("streak")) || 0);
  </script>
</body>
</html>
